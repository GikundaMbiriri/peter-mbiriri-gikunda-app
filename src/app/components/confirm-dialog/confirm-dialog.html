<!-- Overlay -->
<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4"
  role="alertdialog"
  aria-modal="true"
>
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" (click)="cancel.emit()"></div>

  <!-- Dialog -->
  <div
    class="relative w-full max-w-sm bg-white rounded-2xl shadow-2xl overflow-hidden animate-modal-in"
  >
    <!-- Warning header -->
    <div class="p-6 text-center">
      <div class="mx-auto w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mb-4">
        <svg
          class="w-7 h-7 text-red-500"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3m-9 0h14"
          />
        </svg>
      </div>

      <h3 class="text-lg font-bold text-gray-900 mb-2">Delete User</h3>
      <p class="text-gray-500 text-sm leading-relaxed">
        Are you sure you want to delete
        <span class="font-semibold text-gray-800">{{ user.firstName }} {{ user.lastName }}</span
        >? This action cannot be undone.
      </p>
    </div>

    <!-- Actions -->
    <div class="px-6 pb-6 flex gap-3">
      <button
        (click)="cancel.emit()"
        class="flex-1 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition"
      >
        Cancel
      </button>
      <button
        (click)="confirm.emit()"
        class="flex-1 py-2.5 text-sm font-bold text-white bg-red-500 hover:bg-red-600 rounded-lg transition flex items-center justify-center gap-2"
      >
        <svg
          class="w-4 h-4"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          viewBox="0 0 24 24"
        >
          <path
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6"
          />
        </svg>
        Delete
      </button>
    </div>
  </div>
</div>
