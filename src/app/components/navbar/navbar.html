<nav class="bg-kcb-navy shadow-lg sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Brand -->
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-9 h-9 rounded-lg bg-kcb-green shadow-md">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93C9.33 17.79 7 14.5 7 11V7.18L12 5z"
            />
          </svg>
        </div>
        <div>
          <span class="text-white font-black text-lg leading-none">KCB Group</span>
          <p
            class="text-kcb-green text-[10px] font-semibold tracking-widest uppercase leading-none"
          >
            User Management
          </p>
        </div>
      </div>

  

      <!-- Right side -->
      <div class="flex items-center gap-4">
        <!-- User pill — click to open profile drawer -->
        @if (authService.currentUser()) {
          <button
            (click)="toggleProfile()"
            class="hidden sm:flex items-center gap-2.5 bg-white/10 hover:bg-white/20 rounded-full px-3 py-1.5 transition-colors cursor-pointer"
          >
            <div class="w-6 h-6 rounded-full bg-kcb-green flex items-center justify-center">
              <span class="text-white text-xs font-bold uppercase">
                {{ authService.currentUser()!.username.charAt(0) }}
              </span>
            </div>
            <span class="text-white text-sm font-medium">{{
              authService.currentUser()!.username
            }}</span>
            <span
              class="text-kcb-green text-xs font-semibold bg-kcb-green/20 px-1.5 py-0.5 rounded-full"
            >
              {{ authService.currentUser()!.role }}
            </span>
          </button>
        }

        <!-- Logout button -->
        <button
          (click)="logout()"
          class="flex items-center gap-2 bg-white/10 hover:bg-red-500/80 text-white text-sm font-medium px-3 py-2 rounded-lg transition-colors duration-200 border border-white/10 hover:border-transparent"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
          </svg>
          <span class="hidden sm:inline">Logout</span>
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- Profile drawer -->
@if (profileOpen()) {
  <div class="fixed inset-0 z-50 flex justify-end" role="dialog" aria-modal="true">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" (click)="closeProfile()"></div>

    <!-- Panel -->
    <div
      class="relative w-full max-w-md h-full bg-gray-50 shadow-2xl flex flex-col overflow-hidden"
    >
      <!-- Drawer header -->
      <div class="flex items-center justify-between px-6 py-4 bg-kcb-navy shrink-0">
        <h2 class="text-white font-bold text-sm uppercase tracking-wider">My Profile</h2>
        <button
          (click)="closeProfile()"
          class="text-white/60 hover:text-white transition-colors p-1 rounded-lg hover:bg-white/10"
          aria-label="Close profile"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Scrollable content -->
      <div class="flex-1 overflow-y-auto">
        <app-profile />
      </div>
    </div>
  </div>
}
