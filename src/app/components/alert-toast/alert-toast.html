<div class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none" aria-live="polite">
  @for (toast of alertSvc.toasts(); track toast.id) {
    <div
      class="toast-enter flex items-start gap-3 px-4 py-3 rounded-lg shadow-xl min-w-72 max-w-sm pointer-events-auto"
      [class]="toastClasses(toast.type)"
      role="alert"
    >
      <!-- Icon -->
      <svg
        [class]="'w-5 h-5 shrink-0 mt-0.5 ' + iconColor(toast.type)"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="iconPath(toast.type)" />
      </svg>

      <!-- Message -->
      <p class="text-sm font-medium flex-1 leading-snug">{{ toast.message }}</p>

      <!-- Close button -->
      <button
        (click)="dismiss(toast.id)"
        class="shrink-0 text-gray-400 hover:text-gray-600 transition -mt-0.5 -mr-1"
        aria-label="Dismiss"
      >
        <svg
          class="w-4 h-4"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  }
</div>
